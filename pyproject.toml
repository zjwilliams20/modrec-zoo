[project]
name = "modrec-zoo"
version = "0.1.0"
description = "Playground for deep learning algorithms applied to modulation recognition"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy",
    "scipy",
    "polars",
    "tqdm",
    "matplotlib",
    "torch",
    "mlflow",
    "scikit-learn",
    "nvidia-ml-py>=13.595.45",
]

[project.scripts]
simulate = "simulator:main"
train = "train:main"

[tool.uv]
dev-dependencies = [
    "jupyterlab",
    "ipympl",
]
